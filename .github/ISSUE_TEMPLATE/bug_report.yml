name: Bug report
description: Report incorrect behaviour or a crash
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem. Please include a minimal input string and the settings you used.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Input text, `CaretTag` settings, actual vs expected output.
      render: markdown
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Node.js version, browser (if any), bundler.
      placeholder: Node 22, browser N/A
    validations:
      required: false
